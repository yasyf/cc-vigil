# XcodeGen spec for cc-vigil — the source of truth for CCVigil.xcodeproj.
# `xcodegen generate` emits CCVigil.xcodeproj plus the Info.plists under
# Generated/ — all gitignored. Modeled on claude-pool's widget/project.yml.
#
# Signing: ad-hoc (CODE_SIGN_IDENTITY "-") for local and CI builds. The Release
# config here pins the static, notarization-ready posture — hardened runtime, no
# base-entitlement injection (so no get-task-allow), and a minimal per-target
# entitlements file — plus the helper's SMAuthorizedClients team requirement.
# Only the Developer ID identity (CODE_SIGN_IDENTITY) and the real Team ID
# (DEVELOPMENT_TEAM, which the SMAuthorizedClients requirement interpolates) come
# from the release pipeline's xcodebuild command line.
name: CCVigil
options:
  bundleIdPrefix: dev.yasyf
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

# cc-transcript is pinned inside CCVigilShared/Package.swift (the
# CCVigilRuntime target's dependency) so `swift test` and the Xcode build
# share one pin; bump it there.
packages:
  CCVigilShared:
    path: CCVigilShared

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    PRODUCT_NAME: $(TARGET_NAME)
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    # cc-vigil is Apple-Silicon-only: the daemon links cc-transcript's Rust
    # xcframework, which ships a macos-arm64 slice only. Pin arm64 so a plain
    # `xcodebuild -configuration Release` builds and signs cleanly instead of
    # attempting the universal arm64+x86_64 default and failing to link the
    # x86_64 daemon slice.
    ARCHS: arm64
  configs:
    # Release pins the notarization-ready signing posture for every target;
    # xcodebuild signs the app and each embedded tool inside-out under it. Debug
    # is left hardened-runtime-free (so it stays debuggable) with xcodebuild's
    # default entitlement handling untouched.
    Release:
      ENABLE_HARDENED_RUNTIME: "YES"
      # A plain `xcodebuild build` (not archive/-exportArchive) injects
      # get-task-allow=YES even in Release, which notarization rejects on every
      # Mach-O; disabling the base-entitlement injection drops it, leaving each
      # target's own entitlements file as the only entitlement source.
      CODE_SIGN_INJECT_BASE_ENTITLEMENTS: "NO"

targets:
  CCVigil:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
      # launchd job definitions ride inside the bundle so SMAppService can
      # register them by plist name; each sits next to the binary it launches.
      - path: Resources/LaunchAgents/dev.yasyf.cc-vigil.daemon.plist
        buildPhase:
          copyFiles:
            destination: wrapper
            subpath: Contents/Library/LaunchAgents
      - path: Resources/LaunchDaemons/dev.yasyf.cc-vigil.helper.plist
        buildPhase:
          copyFiles:
            destination: wrapper
            subpath: Contents/Library/LaunchDaemons
    info:
      path: Generated/App-Info.plist
      properties:
        CFBundleDisplayName: cc-vigil
        # XcodeGen writes literal values into the generated plist; these $(…)
        # references keep command-line MARKETING_VERSION/CURRENT_PROJECT_VERSION
        # overrides flowing into the bundle at release time.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true # menu-bar app: no Dock icon, no app menu
        LSApplicationCategoryType: public.app-category.developer-tools
    entitlements:
      # Non-sandboxed Developer ID app: the MenuBarExtra, the SMAppService
      # registrant, the read-only NSXPC status client, and spawning the same-team
      # bundled CLI all run under the hardened runtime with zero entitlements.
      # Granting none is the least-privilege posture.
      path: Generated/App.entitlements
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.yasyf.cc-vigil
    dependencies:
      - package: CCVigilShared
        product: CCVigilShared
      - package: CCVigilShared
        product: CCVigilAppKit
      # Menu pause/hold ops ride the daemon's persistent CLI session; the app
      # XPC channel is read-only status.
      - package: CCVigilShared
        product: CCVigilCLIKit
      - package: CCVigilShared
        product: CCVigilTransport
      - target: CCVigilDaemon
        embed: true
        codeSign: true
        copy:
          destination: wrapper
          subpath: Contents/Library/LaunchAgents
      - target: CCVigilHelper
        embed: true
        codeSign: true
        copy:
          destination: wrapper
          subpath: Contents/Library/LaunchDaemons
      # Contents/Helpers, NOT Contents/MacOS — auxiliary executables live in
      # Helpers, and MacOS risks a case-insensitive collision with the app binary.
      - target: cc-vigil
        embed: true
        codeSign: true
        copy:
          destination: wrapper
          subpath: Contents/Helpers

  CCVigilDaemon:
    # LaunchAgent (per-user): the transcript oracle + sleep-assertion holder.
    type: tool
    platform: macOS
    sources:
      - path: Sources/Daemon
      # Caller-verification edge adapters shared with the helper: the SecCode
      # checker and the NSXPCConnection audit-token reader, compiled into each
      # XPC-listener binary so both verify peers through identical code.
      - path: Sources/Shared
    info:
      # Embedded into the binary (__TEXT,__info_plist): a bare executable has no
      # bundle, so launchd and SMAppService learn its identity from the section.
      path: Generated/Daemon-Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    entitlements:
      # LaunchAgent tool: reads transcripts and its own user's process/IOKit/SMC/
      # battery state and talks XPC to the helper — none of which needs an
      # entitlement under the hardened runtime.
      path: Generated/Daemon.entitlements
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.yasyf.cc-vigil.daemon
        CREATE_INFOPLIST_SECTION_IN_BINARY: "YES"
      configs:
        Debug:
          # Ad-hoc/dev builds: CallerVerifier may accept the app by signing
          # identifier alone. Release omits this, so it fails closed on a nil
          # team-id read instead of accepting identifier-only.
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) CCVIGIL_ADHOC_DAEMON_AUTH
    dependencies:
      - package: CCVigilShared
        product: CCVigilShared
      - package: CCVigilShared
        product: CCVigilRuntime
      - package: CCVigilShared
        product: CCVigilTransport

  CCVigilHelper:
    # LaunchDaemon (system, root): privileged clamshell/power work lands here.
    type: tool
    platform: macOS
    sources:
      - path: Sources/Helper
      # Caller-verification edge adapters shared with the daemon (see above).
      - path: Sources/Shared
    info:
      path: Generated/Helper-Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Expanded from CC_VIGIL_AUTHORIZED_CLIENT at build time (Info.plist
        # build-setting expansion): Debug/ad-hoc embeds the name-checked
        # variant; Release embeds the team-pinned requirement, with the team
        # flowing in from the release pipeline's DEVELOPMENT_TEAM=<TEAMID> on
        # the xcodebuild command line (alongside the Developer ID identity).
        # Runtime enforcement is the helper's CallerVerifier either way.
        SMAuthorizedClients:
          - $(CC_VIGIL_AUTHORIZED_CLIENT)
    entitlements:
      # Root LaunchDaemon: an NSXPC listener that holds an IOPMAssertion and
      # execs Apple-signed /usr/bin/pmset. A root XPC listener needs no
      # entitlement — privilege comes from running as root. Caller trust is the
      # SMAuthorizedClients requirement above plus the runtime CallerVerifier,
      # not an entitlement grant.
      path: Generated/Helper.entitlements
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.yasyf.cc-vigil.helper
        CREATE_INFOPLIST_SECTION_IN_BINARY: "YES"
        CC_VIGIL_AUTHORIZED_CLIENT: identifier "dev.yasyf.cc-vigil.daemon"
      configs:
        Debug:
          # Ad-hoc/dev builds: CallerVerifier may accept the daemon by signing
          # identifier alone. Release omits this, so it fails closed on a nil
          # team-id read instead of accepting identifier-only.
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) CCVIGIL_ADHOC_HELPER_AUTH
        Release:
          CC_VIGIL_AUTHORIZED_CLIENT: identifier "dev.yasyf.cc-vigil.daemon" and anchor apple generic and certificate leaf[subject.OU] = "$(DEVELOPMENT_TEAM)"
    dependencies:
      - package: CCVigilShared

  cc-vigil:
    # The user-facing CLI, embedded at Contents/Helpers inside the app bundle.
    type: tool
    platform: macOS
    sources:
      - path: Sources/CLI
    info:
      # Embedded like the daemon's: `cc-vigil version` reads it at runtime.
      path: Generated/CLI-Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    entitlements:
      # CLI tool: talks to the daemon's Unix-domain CLI socket and writes hook
      # config files. No entitlement required.
      path: Generated/CLI.entitlements
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.yasyf.cc-vigil.cli
        CREATE_INFOPLIST_SECTION_IN_BINARY: "YES"
    dependencies:
      - package: CCVigilShared
        product: CCVigilShared
      - package: CCVigilShared
        product: CCVigilCLIKit

schemes:
  CCVigil:
    build:
      targets:
        CCVigil: all
    run:
      config: Debug
    archive:
      config: Release
